<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serveur Discord</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background: linear-gradient(135deg,#1b0b2e,#2a0f4f,#3b146b);
    color:white;
    text-align:center;
}

nav{
    display:flex;
    justify-content:space-between;
    padding:20px 60px;
    align-items:center;
}

.logo{
    font-size:22px;
    font-weight:700;
}

.btn{
    background:#8b5cf6;
    padding:12px 25px;
    border-radius:30px;
    text-decoration:none;
    color:white;
    transition:0.3s;
}

.btn:hover{
    background:#a78bfa;
}

.hero{
    padding:120px 20px;
}

.hero h1{
    font-size:65px;
    margin-bottom:20px;
}

.hero p{
    opacity:0.85;
    font-size:20px;
    max-width:700px;
    margin:auto;
}

.features{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    padding:60px;
}

.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    padding:30px;
    border-radius:25px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
    background:rgba(255,255,255,0.08);
}

.card h3{
    margin-top:0;
}

footer{
    padding:40px;
    opacity:0.7;
}

@media(max-width:768px){
    .hero h1{font-size:40px;}
    nav{padding:20px;}
}
</style>
</head>

<body>

<nav>
    <div class="logo">🎮 Mon Serveur Discord</div>
    <a class="btn" href="https://discord.gg/TONINVITE">Rejoindre Discord</a>
</nav>

    <h1>Bienvenue sur notre communauté</h1>

        Découvre les rôles, les commandes et les événements du serveur.
    </p>
    <br><br>
    <a class="btn" href="https://discord.gg/TONINVITE">Rejoindre maintenant</a>
</section>
